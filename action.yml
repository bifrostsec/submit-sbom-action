name: Submit SBOM to bifrost
description: Submits an SBOM file to the bifrost API for CVE tracking
author: bifrost security
branding:
  icon: 'upload'
  color: 'white'
inputs:
  api-token:
    description: Bearer token for Bifrost API authentication
    required: true
  service:
    description: Service name
    required: true
  service-version:
    description: Service version
    required: true
  image:
    description: 'DEPRECATED: Container image name (accepted, but ignored)'
    required: false
  sbom-path:
    description: >-
      Path to the SBOM file to submit, or a newline-separated list of paths.
    required: false
  dependency-graph:
    description: Export and submit the GitHub dependency graph SBOM for a repository
    required: false
    default: 'false'
  retry-attempts:
    description: Number of retry attempts for failed requests
    required: false
    default: '3'
  retry-delay:
    description: Delay in seconds between retry attempts
    required: false
    default: '5'
  api-host:
    description: Custom API host URL
    required: false
    default: https://portal.bifrostsec.com
runs:
  using: composite
  steps:
    - name: Validate Inputs
      id: validate-inputs
      shell: bash
      env:
        ACTION_SBOM_PATH: ${{ inputs.sbom-path }}
        ACTION_DEPENDENCY_GRAPH: ${{ inputs.dependency-graph }}
        ACTION_IMAGE: ${{ inputs.image }}
        ACTION_RETRY_ATTEMPTS: ${{ inputs.retry-attempts }}
        ACTION_RETRY_DELAY: ${{ inputs.retry-delay }}
      run: bash "$GITHUB_ACTION_PATH/scripts/validate-inputs.sh"

    - name: Export Dependency Graph SBOM
      id: dependency-graph-sbom
      shell: bash
      env:
        ACTION_DEPENDENCY_GRAPH: ${{ inputs.dependency-graph }}
        GH_TOKEN: ${{ github.token }}
      run: bash "$GITHUB_ACTION_PATH/scripts/export-dependency-graph-sbom.sh"

    - name: Install CLI
      id: install-cli
      if: ${{ steps.validate-inputs.outputs.upload_required == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: bash "$GITHUB_ACTION_PATH/scripts/install-cli.sh"

    - name: Upload SBOM
      if: ${{ steps.validate-inputs.outputs.upload_required == 'true' }}
      shell: bash
      env:
        ACTION_API_TOKEN: ${{ inputs.api-token }}
        ACTION_SERVICE: ${{ inputs.service }}
        ACTION_SERVICE_VERSION: ${{ inputs.service-version }}
        ACTION_SBOM_PATH: ${{ inputs.sbom-path }}
        ACTION_DEPENDENCY_GRAPH: ${{ inputs.dependency-graph }}
        ACTION_DEPENDENCY_GRAPH_SBOM_PATH: ${{ steps.dependency-graph-sbom.outputs.dependency_graph_sbom_path }}
        ACTION_RETRY_ATTEMPTS: ${{ inputs.retry-attempts }}
        ACTION_RETRY_DELAY: ${{ inputs.retry-delay }}
        ACTION_API_HOST: ${{ inputs.api-host }}
        CLI_PATH: ${{ steps.install-cli.outputs.cli_path }}
      run: bash "$GITHUB_ACTION_PATH/scripts/upload-sbom.sh"
