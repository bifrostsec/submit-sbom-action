name: Submit SBOM to bifrost
description: Submits an SBOM file to the bifrost API for CVE tracking
author: bifrost security
branding:
  icon: 'upload'
  color: 'white'
inputs:
  api-token:
    description: Bearer token for Bifrost API authentication
    required: true
  service:
    description: Service name
    required: true
  service-version:
    description: Service version
    required: true
  image:
    description: Container image name
    required: false
  sbom-path:
    description: Path to the SBOM file to submit, or a newline-separated list of paths
    required: false
    default: build/sbom.spdx
  dependency-graph:
    description: Export and submit the GitHub dependency graph SBOM for a repository
    required: false
    default: 'false'
  dependency-graph-repository:
    description: Repository to export the dependency graph SBOM from (owner/repo). Defaults to the current repository
    required: false
  retry-attempts:
    description: Number of retry attempts for failed requests
    required: false
    default: '3'
  retry-delay:
    description: Delay in seconds between retry attempts
    required: false
    default: '5'
  api-host:
    description: Custom API host URL
    required: false
    default: https://portal.bifrostsec.com
runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: bash
      env:
        ACTION_SBOM_PATH: ${{ inputs.sbom-path }}
        ACTION_DEPENDENCY_GRAPH: ${{ inputs.dependency-graph }}
        ACTION_IMAGE: ${{ inputs.image }}
        ACTION_RETRY_ATTEMPTS: ${{ inputs.retry-attempts }}
        ACTION_RETRY_DELAY: ${{ inputs.retry-delay }}
      run: bash "$GITHUB_ACTION_PATH/scripts/validate-inputs.sh"

    - name: Export Dependency Graph SBOM
      id: dependency-graph-sbom
      shell: bash
      env:
        ACTION_DEPENDENCY_GRAPH: ${{ inputs.dependency-graph }}
        ACTION_DEPENDENCY_GRAPH_REPOSITORY: ${{ inputs.dependency-graph-repository }}
        DEFAULT_GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_TOKEN: ${{ github.token }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: bash "$GITHUB_ACTION_PATH/scripts/export-dependency-graph-sbom.sh"

    - name: Resolve CLI Asset Name
      id: resolve-asset
      shell: bash
      env:
        RUNNER_OS: ${{ runner.os }}
        RUNNER_ARCH: ${{ runner.arch }}
      run: bash "$GITHUB_ACTION_PATH/scripts/resolve-cli-asset.sh"

    - name: Download CLI
      id: download-cli
      uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f
      with:
        repository: bifrostsec/bifrost-cli
        tag: v0.1.4
        fileName: ${{ steps.resolve-asset.outputs.asset_name }}
        out-file-path: .bifrost-cli

    - name: Verify and Prepare CLI
      id: prepare-cli
      shell: bash
      env:
        CLI_DOWNLOAD_DIR: ${{ github.workspace }}/.bifrost-cli
        ASSET_NAME: ${{ steps.resolve-asset.outputs.asset_name }}
        EXPECTED_SHA: ${{ steps.resolve-asset.outputs.expected_sha }}
        RUNNER_OS: ${{ runner.os }}
      run: bash "$GITHUB_ACTION_PATH/scripts/prepare-cli.sh"

    - name: Execute Tool
      shell: bash
      env:
        ACTION_API_TOKEN: ${{ inputs.api-token }}
        ACTION_SERVICE: ${{ inputs.service }}
        ACTION_SERVICE_VERSION: ${{ inputs.service-version }}
        ACTION_SBOM_PATH: ${{ inputs.sbom-path }}
        ACTION_DEPENDENCY_GRAPH: ${{ inputs.dependency-graph }}
        ACTION_DEPENDENCY_GRAPH_SBOM_PATH: ${{ steps.dependency-graph-sbom.outputs.dependency_graph_sbom_path }}
        ACTION_API_HOST: ${{ inputs.api-host }}
        CLI_PATH: ${{ steps.prepare-cli.outputs.cli_path }}
      run: bash "$GITHUB_ACTION_PATH/scripts/upload-sbom.sh"
