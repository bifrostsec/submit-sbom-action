name: Publish

on:
  release:
    types: [published, edited]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Validate action metadata
        run: |
          grep -q '^  using: composite$' action.yml
      - name: Validate action scripts
        run: |
          bash -n scripts/*.sh
