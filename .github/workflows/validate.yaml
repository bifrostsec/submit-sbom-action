name: Validate

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate shell syntax
        run: bash -n scripts/*.sh

      - name: Run ShellCheck
        run: shellcheck --severity=warning scripts/*.sh
