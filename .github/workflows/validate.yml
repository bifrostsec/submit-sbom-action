name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate shell syntax
        run: bash -n scripts/*.sh

      - name: Run ShellCheck
        run: shellcheck --severity=warning scripts/*.sh
