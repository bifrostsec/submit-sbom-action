name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate action metadata
        run: |
          grep -q '^  using: composite$' action.yml

      - name: Validate shell syntax
        run: bash -n scripts/*.sh

      - name: Run ShellCheck
        run: shellcheck --severity=warning scripts/*.sh
